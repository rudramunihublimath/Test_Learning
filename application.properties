# ─────────────────────────────────────────────────────────────────────────────
# application.properties
# For Azure Web App: override these via Azure App Settings (env vars)
# ─────────────────────────────────────────────────────────────────────────────

server.port=8080

# GitLab Connection
# Set these as Azure App Settings → they override properties at runtime
gitlab.base-url=${GITLAB_BASE_URL:https://gitlab.com}
gitlab.access-token=${GITLAB_ACCESS_TOKEN:your-personal-access-token-here}

# Logging
logging.level.com.example.gitlab=INFO
logging.level.org.springframework.web=WARN

# Jackson
spring.jackson.serialization.indent-output=true
